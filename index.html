<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <h1>Dice Roller</h1>
        <div class="dicecount" id="dicecount"></div>
        <button id="rollButton">Roll Dice</button>
        <div class="dicecontainer">
            <div class="dice1" id="dice1">
                <span class="dicevalue" id="dicevalue1"></span>
            </div>
            <div class="dice2" id="dice2">
                <span class="dicevalue" id="dicevalue2"></span>
            </div>
            <div class="dice3" id="dice3">
                <span class="dicevalue" id="dicevalue3"></span>
            </div>
            <div class="dice4" id="dice4">
                <span class="dicevalue" id="dicevalue4"></span>
            </div>
            <div class="dice5" id="dice5">
                <span class="dicevalue" id="dicevalue5"></span>
            </div>
            <div class="dice6" id="dice6">
                <span class="dicevalue" id="dicevalue6"></span>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
